    raw_text: "All land classified as non-forest (alpine, lakes, swamp, brush, rock,\
      \ etc.), non-productive forest (e.g., wetlands and avalanche tracks), or not\
      \ typed (unreported) are excluded from the AFLB, unless they were harvested\
      \ in the past. These areas do not contribute to forest management objectives\
      \ such as seral objectives for landscape-level biodiversity. The VRI attribute\
      \ \u2018Forest Management Land Base\u2019 (FMLB) will be used to identify areas\
      \ of non-forest. The FMLB attribute categorizes land as forested if it is described\
      \ as \u2018treed\u2019 under the British Columbia Land Cover Classification\
      \ Scheme (BCLCS) and has a site index greater than or equal to five metres.\
      \ Where the VRI has no data for site index or species composition, and no history\
      \ of harvest, the area will be considered non-forest. In addition to the FMLB\
      \ criteria, areas with a crown closure less than 10% also be considered non-forest\
      \ and will be excluded. Areas with low crown closure resulting from past harvest,\
      \ losses from MPB (since 2002) or recent fire (since 2017) are exceptions that\
      \ will remain in the AFLB. A final check will use data from the Freshwater Atlas\
      \ (FWA) data to ensure lakes, rivers and wetlands are appropriately excluded.\
