- step_id: thlb_parent_023_future_roads_compiled_01
  parent_step_id: thlb_parent_023_future_roads
  parent_label: Future roads
  order_index: 23
  step_kind: netdown_rule
  label: Future roads, trails, and landings area reduction
  raw_value: Future roads, trails, and landings area reduction
  raw_text: "The purpose of this section is to identify the portion of the land base\
    \ that is occupied by roads, trails, and landings (RTL) that have been constructed\
    \ to access and facilitate harvest operations. The existing permanent RTL area\
    \ will be removed from the AFLB and will not contribute to timber supply or biodiversity\
    \ objectives. Separate estimates are made to reflect the loss in productive forest\
    \ land due to existing and future RTL. Existing roads, trails and landings The\
    \ area within RTL is typically too small to delineate and track efficiently in\
    \ a landscape-level model so they will be modelled non-spatially through partial\
    \ reductions to the AFLB (i.e., the area considered to be AFLB within each hectare\
    \ will be reduced by a percentage). To estimate the current contribution of roads,\
    \ a geographic information system (GIS) was used to buffer all road lines to estimate\
    \ the area of productive forest land lost to these access features. Forest service\
    \ roads and public roads were buffered 25 metres (12.5 metres from center line)\
    \ and active/retired road permit roads were buffered 15 metres (7.5 metres from\
    \ center line). The mapped non-status roads are known to be inaccurate, and the\
    \ information is incomplete. Since it is impossible to estimate the future state\
    \ of these roads, only the mapped non-status roads will be assumed to impact future\
    \ yield, which assumes that the unmapped non-status roads will not impact future\
    \ yield. The estimated area within existing RTL maintained clearing widths is\
    \ categorized below. On-block (temporary) roads are those roads that are only\
    \ used to access cutblocks for harvesting or silviculture operations. They are\
    \ assigned a width of zero metres, as these temporary roads are either reforested\
    \ by planting or fill in over time as stands regenerate. Table 6. Width and area\
    \ of existing road to calculate reductions Road class Width (m) Hectares Forest\
    \ Service roads 25 8,343 Ministry of Transportation and Infrastructure 25 6,280\
    \ Road permit and landings 15 19,641 Mapped non-status roads 5 16,169 Most harvesting\
    \ now uses a roadside processing system, and landings are less common in current\
    \ harvest systems. There are indications that some productivity loss is associated\
    \ with the use of roadside harvesting systems, but no definitive research to date\
    \ has quantified a level of productivity loss. In-block roads that are temporary\
    \ in nature will have no deduction from the THLB. In total, 32 526 hectares will\
    \ be excluded for all roads. Future roads, trails and landings The AFLB area removed\
    \ to account for future RTL was estimated based on current performance and RESULTS\
    \ data. The future RTL reduction will be applied to future harvested areas in\
    \ the timber supply model after stands are harvested for the first time. Reduction\
    \ factors for future RTL were calculated based on the average amount of on-block\
    \ road permit structures with an estimated 15 metres width that have been observed\
    \ in the five-year period from January 2015 to April 2021. The average factor\
    \ is 2.28% for all three Cariboo TSAs. The yields of all stands aged 70 years\
    \ and above will be reduced by this factor after they are harvested. In total,\
    \ 22 754 hectares will be excluded from the forested land base at the time of\
    \ first harvest to represent the area lost due to future road development. Data\
    \ source and comments: Roads will be identified from forest tenure road mapping\
    \ as roads with a description of \u2018Forest Service Road\u2019 or \u2018Road\
    \ Permit\u2019 and have a status of \u2018active\u2019, \u2018retired\u2019 or\
    \ \u2018pending\u2019. Digital road atlas mapping will also be used but will exclude\
    \ roads classed as \u2018resource\u2019. The last five years of road construction\
    \ in recent cutblocks were examined using existing road permit data for all three\
    \ TSAs in the CNRR. Road lengths were derived from the following data sets from\
    \ the BCGW. FSR 25 m WHSE_FOREST_TENURE.FTEN_ROAD_SECTION_LINES_SVW (Active) Public\
    \ 25 m WHSE_IMAGERY_AND_BASE_MAPS.MOT_HIGHWAY_PROFILES_SP Road permit 15 m WHSE_FOREST_TENURE.FTEN_ROAD_SECTION_LINES_SVW\
    \ (Active) Non-status 5 m WHSE_BASEMAPPING.DRA_DGTL_ROAD_ATLAS_MPAR_SP (Outside\
    \ of cutblocks) On-block roads (temporary) 0 m WHSE_BASEMAPPING.DRA_DGTL_ROAD_ATLAS_MPAR_SP\
    \ (roads that are inside cutblocks harvested from 2015 to present using WHSE_FOREST_VEGETATION.VEG_CONSOLIDATED_CUT_BLOCKS_SP)\
    \ Note: Because there is overlap between the different types of roads, the following\
    \ priority was used: public, FSR, permit, non-status. This means if a public road\
    \ overlaps with any other type of road the area will be allocated to the public\
    \ road. Removed all roads that fall over managed licences, tree farms, private,\
    \ federal, and municipal lands. The LHLB is the portion of the AFLB where timber\
    \ harvesting is legal, subject to forest management objectives and constraints.\
    \ It excludes protected areas such as national parks, provincial parks, protected\
    \ areas and legally established areas where timber harvesting is prohibited. Areas\
    \ excluded from the LHLB are also excluded from the THLB."
