    raw_text: "Wildlife habitat reductions may be identified and managed through several\
      \ processes including the Identified Wildlife Management Strategy, identification,\
      \ and approval of ungulate winter range (UWR), and management practices specified\
      \ in plans such as the CCLUP that establish legal wildlife habitat objectives.\
      \ Management practices may include no harvesting in core areas as well as modified\
      \ harvesting in associated management zones. Several approved wildlife habitat\
      \ areas (WHA) are designated within the CNRR. The associated General Wildlife\
      \ Measures (GWM) established by ministerial order under the GARs guide harvest\
      \ practices in WHAs. Areas designated through GWMs as \u201Cno harvest\u201D\
      \ will be excluded from the LHLB. Areas designated as \u201Cconditional harvest\
      \ zone\u201D will be addressed in Section 7 \u2013 \u2018Current forest management\
      \ assumptions\u2019 and Section 7.1.8 \u2013 \u2018Silviculture systems\u2019\
      . Table 9. Wildlife habitat areas Designations Total (ha) Forested (ha) Excluded\
      \ (ha) UWR no-harvest area 25 23 23 Caribou no-harvest area 208,868 163,217\
      \ 154,033 There is a Caribou Herd Planning process currently ongoing within\
      \ the CNRR. The outcome of additional area protection through no harvest or\
      \ modified harvest resulting from this process are currently unknown. There\
      \ may potentially be additional protections put in place for caribou that will\
      \ have a downward pressure on the timber supply. Ministry staff will stay informed\
      \ on the progress of this working group and inform the TSR throughout the process."
