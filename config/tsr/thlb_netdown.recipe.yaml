    order_index: 14
    step_kind: netdown_rule
    label: Steep-slope 250 m3/ha threshold
    raw_value: Steep-slope 250 m3/ha threshold
    raw_text: "Sites may have low productivity because of inherent site factors such\
      \ as nutrient availability, exposure or excessive moisture. Stands on these\
      \ sites may contribute to non-timber objectives even though they are unlikely\
      \ to grow a merchantable crop of trees in a reasonable amount of time. As such,\
      \ low productivity stands are removed from the THLB. Low productivity stands\
      \ were identified as stands that are not capable of achieving the minimum harvestable\
      \ volume applied in this analysis by 160 years. As discussed in Section 7.1.6\
      \ \u2013 \u2018Minimum harvestable criteria\u2019, the minimum threshold is\
      \ 80 cubic metres per hectare except for steep slopes where the threshold increases\
      \ to 250 cubic metres per hectare. The VRI has been adjusted to reflect losses\
      \ due to the MPB epidemic and recent catastrophic fires. It is now difficult\
      \ to discern low productivity stands from recently disturbed stands based on\
      \ the current adjusted attributes and yield projections created from these attributes\
      \ are no longer reliable as they do not account for stand recovery and release\
      \ of understory regeneration. Site index was not adjusted and remains a reliable\
      \ identifier of low productivity stands and will be used in this analysis. In\
      \ order to utilize site index, an exercise was conducted to find the correlation\
      \ between site index and the minimum harvestable criteria. Representative yield\
      \ tables for the major leading species within Williams Lake TSA were produced\
      \ at increasing increments of site index until a yield table that achieved the\
      \ minimum harvestable criteria was identified for each species and each BEC\
      \ zone. Table 17. Site index threshold for sites with low timber growing potential\
      \ Leading species BEC zone Total (ha) AFLB (ha) SI (m) at 80 m3/ha SI (m) at\
