- step_id: thlb_parent_005_analysis_forest_land_base_compiled_01
  parent_step_id: thlb_parent_005_analysis_forest_land_base
  parent_label: Analysis forest land base
  order_index: 5
  step_kind: reference_target
  label: Analysis forest land base
  raw_value: Land not administered by the Province for TSA timber supply
  raw_text: "Certain types of lands do not contribute to timber supply for the purpose\
    \ of this timber supply analysis. This includes privately held lands, First Nations\
    \ reserves, some lands under the jurisdiction of the federal government and area-based\
    \ forest tenures. Parks and protected areas are included in the AFLB because they\
    \ can be relied on to continually contribute to forest cover management objectives\
    \ such as landscape-level biodiversity, visual quality, and wildlife habitat objectives.\
    \ The CCLUP specifies that woodlots also contribute to landscape-level forest\
    \ management objectives for biodiversity, although the AAC for these woodlots\
    \ is determined under a separate process. Area-based licences such as community\
    \ forest agreements and First Nations woodland licences (FNWL) are expected to\
    \ manage for landscape-level biodiversity objectives within their tenured areas,\
    \ therefore they are removed from the AFLB. Woodlots are not required to manage\
    \ for landscape-level biodiversity objectives, so they are left in the AFLB and\
    \ removed when defining the LHLB. The Northern Secwepemc te Qelmucw (NStQ) Treaty\
    \ Negotiations Agreement in Principle was signed on July 22, 2018, and the Parties\
    \ are in Stage 5 negotiations to conclude treaty. The NStQ Interim Treaty Agreement\
    \ (ITA) Phase 1 land transfer parcels are no longer administered by the Province\
    \ and will be excluded from the AFLB. Additional NStQ Agreement in Principle (AIP)\
    \ lands which are detailed in the signed AIP may also be transferred soon. The\
    \ implications of these additional transfers to timber supply implications will\
    \ be explored through sensitivity analysis. On June 26, 2014, the Supreme Court\
    \ of Canada (SCC) released its decision on Tsilhqot\u2019in Nation v. British\
    \ Columbia (Tsilhqot\u2019in decision). In that decision the SCC outlined areas\
    \ over which the Tsilhqot\u2019in Nation has proven and declared Aboriginal title.\
    \ Proven and declared Aboriginal title lands are not considered Crown land. As\
    \ such, those lands do not contribute to timber supply in the Williams Lake TSA\
    \ and are excluded from the AFLB. A spatial data set of land ownership was developed\
    \ using information from the Crown Land Registry and the Integrated Cadastral\
    \ Information Society. Areas classified in this data set with ownership codes\
    \ 62 (Forest Management Unit) or 69 (Community Watershed) are generally administered\
    \ by the Province for TSA timber supply. These areas were reviewed by district\
    \ staff to ensure all categories they contain can appropriately be considered\
    \ AFLB for purposes of this analysis. Minor areas, including those identified\
    \ as development project, institutional and residential, were excluded from the\
    \ AFLB. Otherwise, the remaining area with these ownership codes will be modelled\
    \ as managed for TSA timber supply. Areas classified with ownership code 99 (crown\
    \ leases) are not generally managed for TSA timber supply but were similarly reviewed\
    \ prior to this analysis. Minor areas, including those categorized as grazing\
    \ leases, will be considered as contributing to TSA timber supply because harvesting\
    \ that occurs on these lease areas contributes to the TSA harvest level."
