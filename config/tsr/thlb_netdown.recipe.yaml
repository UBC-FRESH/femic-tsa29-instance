    parent_label: Cultural heritage and archaeological resources
    order_index: 21
    step_kind: netdown_rule
    label: Cultural heritage and archaeological resources reduction
    raw_value: Cultural heritage and archaeological resources reduction
    raw_text: "The Heritage Conservation Act (HCA) recognizes the historical, cultural,\
      \ scientific, spiritual, and educational value of archaeological sites to First\
      \ Nations, local communities, and the public. Archaeological sites on both public\
      \ and private land are protected under the HCA and must not be altered without\
      \ a permit. A cultural heritage resource is an object, site or location of a\
      \ traditional societal practice that is of historical, cultural, societal or\
      \ archaeological significance to the province, community or an Aboriginal People.\
      \ This can include archaeological sites, structural features, heritage landscape\
      \ features and traditional use sites. Cultural heritage resources not applicable\
      \ to the HCA are managed for by the licensees through the cultural heritage\
      \ resource sections in the applicable FSPs as per FPPR Section 10. Cultural\
      \ heritage resources are identified by the licensees through information sharing\
      \ prior to the submission of cutting permit and road permit applications to\
      \ the ministry. The most common practice by licensees is to manage for these\
      \ sites by excluding them from the harvest area through boundary amendments\
      \ and the placement of wildlife tree retention and/or cultural resource management\
      \ zones. The incremental excluded area required to protect these sites in current\
      \ practices was discussions with licensees and the Tsilhqot\u2019in National\
      \ Government. It was estimated that, on average, an additional two percent of\
      \ the cutblock area was now included in these expanded exclusions and/or reserves.\
      \ This will be modelled as an aspatial reduction to the THLB. In total, 34 205\
      \ hectares will be excluded to represent cultural heritage resources. Data source\
      \ and comments: Tsilhqot\u2019in National Government Tolko Industries Ltd. -\
      \ FSP #780; West Fraser Mills Ltd. - FSP #755; and BCTS - FSP #828."
    land_base_stage: lhlb_to_thlb
    stage_label: LHLB -> THLB
