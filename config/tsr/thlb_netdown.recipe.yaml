  parent_step_id: thlb_parent_013_areas_considered_inoperable
  parent_label: Areas considered inoperable
  order_index: 13
  step_kind: netdown_rule
  label: Unstable terrain and terrain class 5
  raw_value: Unstable terrain and terrain class 5
  raw_text: "Areas that are inoperable within the TSA are generally associated with\
    \ steep slopes. Steep slopes are unlikely to be harvested because of unstable\
    \ terrain and sensitive soils. Also, steep slopes require the use of different\
    \ harvest systems such as cable logging which may be uneconomic depending on volume\
    \ per hectare. Inoperable areas will be identified as follows: \u2022 Slopes that\
    \ exceed 70% east of Highway 97. Harvesting on slopes between 40% and 70%, and\
    \ cable harvesting has been employed as a past practice east of Highway 97. \u2022\
    \ Slopes that exceed 40% west of Highway 97. These slopes typically have lower\
    \ volume per hectare which generally makes these types unsuitable for harvesting.\
    \ \u2022 Slopes classified as Unstable (U) or Terrain Class 5. Table 16. Areas\
    \ considered inoperable Designations Total (ha) Forested (ha) Excluded (ha) Steep\
    \ slopes 491,492 92,748 31,974 Unstable terrain 15,051 3,923 1,559 Data source\
