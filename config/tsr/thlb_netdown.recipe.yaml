- step_id: thlb_parent_020_wildlife_tree_retention_areas_compiled_01
  parent_step_id: thlb_parent_020_wildlife_tree_retention_areas
  parent_label: Wildlife tree retention areas
  order_index: 20
  step_kind: netdown_rule
  label: Future wildlife tree retention area reduction
  raw_value: Future wildlife tree retention area reduction
  raw_text: "Wildlife tree retention areas (WTRA) are established within and adjacent\
    \ to cutblocks to maintain stand-level biodiversity and are discussed in more\
    \ detail in Section 7.2.4 \u2013 \u2018Stand-level biodiversity\u2019. Currently\
    \ mapped WTRA are recorded in RESULTS (identified by Type = \u2018Group\u2019\
    \ and Objective = \u2018WTR\u2019). Harvesting of WTRA is only restricted until\
    \ the regenerating cutblock has reached maturity so the existing mapped WTRA will\
    \ be included in the THLB but will be deferred from harvest for 80 years. Although\
    \ individual WTRA can eventually be harvested there will always be WTRA established\
    \ in conjunction with every cutblock harvested. In the base case, the land base\
    \ that will continually be required for WTRA will be modelled as an aspatial THLB\
    \ reduction factor. In total, 94 417 hectares will be excluded to represent future\
    \ WTRA."
