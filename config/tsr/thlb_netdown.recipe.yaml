    label: Old growth management areas
    raw_value: Old growth management areas
    raw_text: Permanent and Permanent-Rotating Old Growth Management Areas (OGMA)
      are removed from the LHLB as no harvest areas. A limited amount of harvest is
      permitted in OGMAs for specified exceptions including insect control and wildfire
      risk reduction treatments. Loss of OGMAs for other reasons such as Land Act
      tenure overlap must be replaced with equivalent area in the same BEC subzone
      within the same landscape unit. This replacement process ensures that OGMA targets
      are maintained over time and result in no impact to timber supply. Transition
      OGMAs will cease to exist in 2030. Until then they are available for harvest
      if conifer mortality exceeds 50%. It is assumed that any such harvest has already
      occurred in Transition OGMAs, therefore Transition OGMAs will be removed from
      the LHLB until 2030 after which they will be fully restored to the LHLB. Table
      8. Old growth management areas Designations Total (ha) Forested (ha) Excluded
