  label: Steep-slope 250 m3/ha threshold
  raw_value: Steep-slope 250 m3/ha threshold
  raw_text: "Sites may have low productivity because of inherent site factors such\
    \ as nutrient availability, exposure or excessive moisture. Stands on these sites\
    \ may contribute to non-timber objectives even though they are unlikely to grow\
    \ a merchantable crop of trees in a reasonable amount of time. As such, low productivity\
    \ stands are removed from the THLB. Low productivity stands were identified as\
    \ stands that are not capable of achieving the minimum harvestable volume applied\
    \ in this analysis by 160 years. As discussed in Section 7.1.6 \u2013 \u2018Minimum\
    \ harvestable criteria\u2019, the minimum threshold is 80 cubic metres per hectare\
    \ except for steep slopes where the threshold increases to 250 cubic metres per\
    \ hectare. The VRI has been adjusted to reflect losses due to the MPB epidemic\
    \ and recent catastrophic fires. It is now difficult to discern low productivity\
    \ stands from recently disturbed stands based on the current adjusted attributes\
    \ and yield projections created from these attributes are no longer reliable as\
    \ they do not account for stand recovery and release of understory regeneration.\
    \ Site index was not adjusted and remains a reliable identifier of low productivity\
    \ stands and will be used in this analysis. In order to utilize site index, an\
    \ exercise was conducted to find the correlation between site index and the minimum\
    \ harvestable criteria. Representative yield tables for the major leading species\
    \ within Williams Lake TSA were produced at increasing increments of site index\
    \ until a yield table that achieved the minimum harvestable criteria was identified\
    \ for each species and each BEC zone. Table 17. Site index threshold for sites\
    \ with low timber growing potential Leading species BEC zone Total (ha) AFLB (ha)\
    \ SI (m) at 80 m3/ha SI (m) at 250 m3/ha Bl BAFA 111 111 Bl CWH 897 897 4.73 7.01\
    \ Bl ESSF 124,601 124,299 5.82 9.96 Bl ICH 5,375 5,300 5.76 9.99 Bl IDF 321 321\
    \ 5.56 9.40 Bl IMA 478 478 Bl MH 2,020 2,020 4.61 6.76 Bl MS 3,114 3,098 5.91\
    \ 10.38 Bl SBPS 254 252 5.60 9.82 Bl SBS 3,283 3,217 5.73 9.82 Cw CWH 157 157\
