    \ 13.18 Sx IMA 46 46 Sx MH 918 918 4.52 7.25 Sx MS 54,171 53,886 9.33 16.64 Sx\
    \ SBPS 95,107 94,285 8.00 14.00 Sx SBS 44,895 44,075 9.01 15.92 All stands with\
