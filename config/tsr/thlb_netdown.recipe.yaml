    raw_value: Broadleaf-leading stands
    raw_text: "Non-merchantable timber profiles are stands that are physically operable,\
      \ meet minimum harvestable criteria for age and volume, yet contain tree species\
      \ that are not currently utilized. In the Williams Lake TSA, stands predominately\
      \ composed of broadleaf species are not utilized, and often left standing for\
      \ biodiversity value. Therefore, broadleaf-leading stands will be excluded from\
      \ the THLB. The deciduous component of conifer-leading stands is discussed under\
      \ Section 7.1.5 \u2013 \u2018Volume exclusions for broadleaf species\u2019.\
      \ Table 19. Broadleaf-leading stands Designations Total (ha) Forested (ha) Excluded\
      \ (ha) Aspen-leading stands 160,809 99,616 45,113 Birch-leading stands 11,278\
      \ 8,051 3,939 The potential contribution of broadleaf-deciduous leading stands\
      \ to timber supply will be explored through sensitivity analysis."
