    label: Proven Aboriginal Rights area boundary
    raw_value: Proven Aboriginal Rights area boundary
    raw_text: "The Tsilhqot\u2019in 2012 BC Supreme Court decision confirmed a proven\
      \ Aboriginal rights area (PRA) where Tsilhqot\u2019in people hold rights to\
      \ hunt and trap birds and animals. This area overlaps the Tsilhqot\u2019in proven\
      \ and declared Aboriginal title area and extends beyond encompassing the entire\
      \ court case area. This area, outside the title area, is still administered\
      \ by the Province and contributes to timber supply within the Williams Lake\
      \ TSA. Deep consultation is required when considering proposed authorizations\
      \ in this area and since 2014, very few provincial authorizations have been\
      \ made in this area because management expectations are unique. The PRA will\
      \ be excluded from the THLB to reflect the lack of commercial forestry activity\
