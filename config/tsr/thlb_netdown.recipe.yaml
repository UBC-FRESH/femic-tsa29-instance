- step_id: thlb_parent_018_riparian_areas_compiled_stream_s1
  parent_step_id: thlb_parent_018_riparian_areas
  parent_label: Riparian areas
  order_index: 18
  step_kind: netdown_rule
  label: Stream class S1 effective riparian buffer
  raw_value: Stream class S1 effective riparian buffer
  raw_text: "Riparian areas along streams and around wetlands will be modelled as\
    \ managed according to the Forest Practices Code Riparian Management Area Guidebook\
    \ (1995). Table 15 lists the area reductions to be applied to account for Riparian\
    \ Reserve Zones (RRZ) and Riparian Management Zones (RMZ). The zone widths are\
    \ consistent with those specified under FPPR and current FSPs. Each stream, lake,\
    \ and wetland class were spatially identified, classified, and then buffered using\
    \ GIS in accordance with Table 15 criteria to create a riparian area to be modelled\
    \ in the analysis. Limited harvesting is permitted in riparian management zones\
    \ so the zone width was adjusted by the percentage of required retention to derive\
    \ a modelled equivalent area where harvesting is fully excluded. The reserve widths\
    \ and percent retention amounts are listed in Table 15 along with the calculated\
    \ area excluded from the THLB to represent riparian areas. Table 15. Riparian\
    \ areas Description Class Reserve zone width (metres) Reduction (%) Management\
    \ zone width (metres) RMZ retention (%) Riparian area width (metres) Streams S1\
    \ 50 100 20 50 60 S2 30 100 20 20 34 S3 20 100 20 20 24 S4/S5 0 - 30 30 10 S6\
    \ 0 - 20 30 6 Wetlands W1/W5 10 100 40 20 18 W2 10 100 20 20 14 W3/W4 0 - 30 20\
    \ 6 Lakes L1-B 10 100 0 - 10 L2 10 100 20 25 15 L3/L4 0 - 30 25 7.5 The management\
    \ of fisheries sensitive watersheds will be discussed later under Section 7.2.10\
    \ \u2013 \u2018Fisheries sensitive watersheds\u2019. However, the management requirements\
    \ for the protection of dolly varden trout habitat are accounted for in this netdown\
    \ through increased riparian reserve zone widths. Licensee FSPs specify that within\
    \ the Niut SRDZ and the South Chilcotin SRDZ, a 20-metre riparian reserve zone\
    \ will be maintained on streams classified as S4 to protect dolly varden trout\
    \ populations. For the analysis, the riparian area width applied to S4 streams\
    \ in these landscape units was increased to 30 metres. In total, 54 833 hectares\
    \ will be excluded to account for the total riparian areas of 199 820 hectares.\
    \ Data source and comments: A previously conducted GIS project mapped RRZs and\
    \ RMZs for streams, lakes, and wetlands in the CNRR. Riparian Classification,\
    \ RMZs and Riparian Management Areas are derived from the LAO Objectives 20 and\
    \ 23; CCLUP Objectives for Riparian Management; and the FPPR Sections 47, 48,\
    \ 49, 50, 52(2) and 53. RMZ reductions are derived from: LAO objectives 21 and\
    \ 22 - Retention of Trees in a RMZ as well as FSP commitments from the three major\
    \ licensees (Tolko Industries Ltd., FSP #780; West Fraser Mills Ltd., FSP #755\
    \ and BCTS, FSP #828) within the CNRR."
  land_base_stage: lhlb_to_thlb
  stage_label: LHLB -> THLB
  execution_class: projected_harvest_exclusion
  compiled_operation_type: buffer_then_intersect
  step_status: ready
