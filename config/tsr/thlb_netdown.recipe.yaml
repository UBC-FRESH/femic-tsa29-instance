- step_id: thlb_parent_016_recreation_features_compiled_01
  parent_step_id: thlb_parent_016_recreation_features
  parent_label: Recreation features
  order_index: 16
  step_kind: netdown_rule
  label: Active recreation polygons
  raw_value: Active recreation polygons
  raw_text: 'Recreation sites and trails have been legally established within the
    Williams Lake TSA under the FRPA. These include campsites and trails as well as
    sites created for a variety of education and recreation activities. Approved FSPs
    include a strategy related to legally established recreations sites and trails.
    This strategy is to refer proposed harvesting and road construction to the ministry
    responsible for recreation requesting input on the proposal. Any input received
    will be incorporated into the harvesting and road construction management strategy.
    While logging is possible, it is likely that harvesting of recreation sites will
    be very limited so identified recreational areas and features will be excluded
    from the THLB. Table 20. Recreation features Land classification Total (ha) Forested
    (ha) Excluded (ha) Use, Recreation and Enjoyment of the Public (UREP) 3,551 2,356
    1,320 Forest recreation 15,699 13,058 8,051 Recreation features 23,727 14,774
    227 Data source and comments: Tolko Industries Ltd. - FSP #780; West Fraser Mills
    Ltd. - FSP #755; and BCTS - FSP #828.'
