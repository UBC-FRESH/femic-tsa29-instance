  step_kind: netdown_rule
  label: Growth and yield permanent sample plots
  raw_value: Growth and yield permanent sample plots and research installations
  raw_text: The ministry maintains a network of growth and yield permanent sample
    plots (PSP) across the province for the purposes of understanding forest growth
    and calibrating growth and yield models. Objectives for these plots have not been
    established under FRPA. However, harvesting within these active research sites
    is currently avoided and only occurs after consultation with the research team.
    Research scientists from within the ministry confirm that these areas should be
    excluded from the THLB.
