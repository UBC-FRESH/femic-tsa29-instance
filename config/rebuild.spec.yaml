schema_version: "1.0"

instance:
  case_id: "tsa29"
  instance_root: "."

runtime:
  run_config: "config/run_profile.tsa29.yaml"
  tipsy_config_dir: "config/tipsy"
  patchworks_config: "config/patchworks.runtime.windows.yaml"
  log_dir: "vdyp_io/logs"
  baseline_unexpected_diff_threshold: 0

steps:
  - step_id: "validate_case"
    kind: "femic_command"
    command: "femic prep validate-case --run-config config/run_profile.tsa29.yaml --tipsy-config-dir config/tipsy"
    required: true
    depends_on: []
    mutable_artifacts: []
    expected_outputs:
      - "case preflight success"

  - step_id: "geospatial_preflight"
    kind: "femic_command"
    command: "femic prep geospatial-preflight"
    required: true
    depends_on: ["validate_case"]
    mutable_artifacts: []
    expected_outputs:
      - "geospatial preflight success"

  - step_id: "compile_upstream"
    kind: "femic_command"
    command: "femic run --run-config config/run_profile.tsa29.yaml"
    required: true
    depends_on: ["geospatial_preflight"]
    mutable_artifacts:
      - "data/*"
      - "vdyp_io/logs/*"
    expected_outputs:
      - "run_manifest-<run_id>.json"
      - "data/03_input-tsa29.csv (canonical BTC boundary handoff; femic run is expected to stop here)"
      - "data/tipsy_params_tsa29.xlsx"

  - step_id: "btc_post_tipsy_bundle"
    kind: "femic_command"
    command: "femic tsa btc-post-tipsy --run-config config/run_profile.tsa29.yaml --tsa 29 --run-id <run_id>"
    required: true
    depends_on: ["compile_upstream"]
    mutable_artifacts:
      - "data/model_input_bundle/*"
      - "vdyp_io/logs/*"
    expected_outputs:
      - "data/04_output-tsa29.csv"
      - "data/04_error-tsa29.csv"
      - "post-tipsy manifest and bundle tables (supported continuation seam after the BTC boundary)"

  - step_id: "patchworks_preflight"
    kind: "femic_command"
    command: "femic patchworks preflight --config config/patchworks.runtime.windows.yaml"
    required: true
    depends_on: ["btc_post_tipsy_bundle"]
    mutable_artifacts: []
    expected_outputs:
      - "patchworks preflight success"

  - step_id: "patchworks_build_blocks"
    kind: "femic_command"
    command: "femic patchworks build-blocks --config config/patchworks.runtime.windows.yaml --with-topology"
    required: true
    depends_on: ["patchworks_preflight"]
    mutable_artifacts:
      - "models/tsa29_patchworks_model/blocks/*"
    expected_outputs:
      - "blocks.shp"
      - "topology_blocks_200r.csv"

  - step_id: "patchworks_matrix_build"
    kind: "femic_command"
    command: "femic patchworks matrix-build --config config/patchworks.runtime.windows.yaml"
    required: true
    depends_on: ["patchworks_build_blocks"]
    mutable_artifacts:
      - "models/tsa29_patchworks_model/tracks/*"
      - "vdyp_io/logs/patchworks_matrixbuilder_*"
    expected_outputs:
      - "patchworks_matrixbuilder_manifest-<run_id>.json"

invariants:
  - invariant_id: "managed_area_sanity"
    severity: "fatal"
    metric: "managed_area_ha"
    comparator: "gt"
    target: 0
    remediation: "Check IFM assignment logic and source checkpoint artifacts."

  - invariant_id: "block_join_consistency"
    severity: "fatal"
    metric: "block_join_mismatch_count"
    comparator: "eq"
    target: 0
    remediation: "Rebuild blocks/topology and verify BLOCK key alignment."

  - invariant_id: "seral_accounts_present"
    severity: "fatal"
    metric: "seral_account_count"
    comparator: "gt"
    target: 0
    remediation: "Re-export ForestModel XML and rerun matrix build."

  - invariant_id: "baseline_structure_match"
    severity: "warn"
    metric: "baseline_match"
    comparator: "eq"
    target: true
    remediation: "Review structural table diffs and allowlist only intentional deltas."
